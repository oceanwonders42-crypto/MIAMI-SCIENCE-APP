<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Miami Science Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #18181b;
      color: #e4e4e7;
      text-align: center;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
    p { font-size: 0.9375rem; color: #a1a1aa; margin: 0 0 1rem; max-width: 280px; }
    button {
      padding: 0.625rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 500;
      color: #18181b;
      background: #eab308;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
    }
    button:active { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>Can’t connect</h1>
  <p>Check your connection and try again. The app needs the internet to load.</p>
  <button type="button" id="retry">Try again</button>
  <script>
    document.getElementById('retry').onclick = function () { window.location.reload(); };
  </script>
</body>
</html>
